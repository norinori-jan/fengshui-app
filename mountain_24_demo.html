<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地盤二十四山補正エンジン デモ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            display: flex;
            gap: 20px;
        }
        .compass-container {
            flex: 1;
        }
        .info-container {
            flex: 1;
        }
        #compass-svg {
            width: 100%;
            height: 400px;
            border: 1px solid #ccc;
            background: #f9f9f9;
        }
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .correction-line {
            stroke: red;
            stroke-width: 1;
            stroke-dasharray: 2,2;
        }
        .stats {
            background: #f0f0f0;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>地盤二十四山補正エンジン デモ</h1>

    <div class="container">
        <div class="compass-container">
            <h2>羅盤表示 (104分割 + 24山補正)</h2>
            <svg id="compass-svg" viewBox="-120 -120 240 240">
                <!-- 基本円 -->
                <circle cx="0" cy="0" r="100" fill="none" stroke="#333" stroke-width="2"/>
                <circle cx="0" cy="0" r="90" fill="none" stroke="#666" stroke-width="1"/>

                <!-- 方向ラベル -->
                <text x="0" y="-105" text-anchor="middle" font-size="12">北</text>
                <text x="105" y="5" text-anchor="middle" font-size="12">東</text>
                <text x="0" y="115" text-anchor="middle" font-size="12">南</text>
                <text x="-105" y="5" text-anchor="middle" font-size="12">西</text>

                <!-- 24山の位置 -->
                <g id="mountain-markers"></g>

                <!-- 補正線 -->
                <g id="correction-lines"></g>
            </svg>

            <div class="stats" id="stats-display">
                <!-- 統計情報がここに表示される -->
            </div>
        </div>

        <div class="info-container">
            <h2>補正データ</h2>
            <div id="correction-table">
                <!-- テーブルがここに表示される -->
            </div>
        </div>
    </div>

    <script type="module">
        import LopanCorrectionEngine from './LopanCorrectionEngine_24mountain.js';

        // エンジン初期化
        const engine = new LopanCorrectionEngine();

        // SVG要素を取得
        const svg = document.getElementById('compass-svg');
        const mountainMarkers = document.getElementById('mountain-markers');
        const correctionLines = document.getElementById('correction-lines');

        // 24山のマーカーを描画
        function drawMountainMarkers() {
            const corrections = engine.CORRECTIONS.mountain_24 || [];

            corrections.forEach(correction => {
                const angle = correction.ideal * (Math.PI / 180);
                const x = 85 * Math.cos(angle - Math.PI/2); // 北を上にする
                const y = 85 * Math.sin(angle - Math.PI/2);

                // マーカー円
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', x);
                circle.setAttribute('cy', y);
                circle.setAttribute('r', '3');
                circle.setAttribute('fill', correction.correction === 0 ? 'blue' : 'orange');
                circle.setAttribute('title', `山${correction.id}: ${correction.ideal}° (補正: ${correction.correction > 0 ? '+' : ''}${correction.correction.toFixed(3)}°)`);

                // ラベル
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', x);
                text.setAttribute('y', y - 8);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('font-size', '8');
                text.textContent = correction.id;

                mountainMarkers.appendChild(circle);
                mountainMarkers.appendChild(text);
            });
        }

        // 補正線を描画
        function drawCorrectionLines() {
            const corrections = engine.CORRECTIONS.mountain_24 || [];

            corrections.forEach(correction => {
                if (Math.abs(correction.correction) > 0.01) {
                    const angle = correction.actual * (Math.PI / 180);
                    const x1 = 75 * Math.cos(angle - Math.PI/2);
                    const y1 = 75 * Math.sin(angle - Math.PI/2);
                    const x2 = 95 * Math.cos(angle - Math.PI/2);
                    const y2 = 95 * Math.sin(angle - Math.PI/2);

                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', x1);
                    line.setAttribute('y1', y1);
                    line.setAttribute('x2', x2);
                    line.setAttribute('y2', y2);
                    line.setAttribute('stroke', 'red');
                    line.setAttribute('stroke-width', '1');
                    line.setAttribute('stroke-dasharray', '2,2');
                    line.setAttribute('class', 'correction-line');
                    line.setAttribute('title', `山${correction.id}: 補正 ${correction.correction > 0 ? '+' : ''}${correction.correction.toFixed(3)}°`);

                    correctionLines.appendChild(line);
                }
            });
        }

        // 統計情報を表示
        function displayStats() {
            const stats = engine.getCorrectionStatistics();
            const statsDiv = document.getElementById('stats-display');

            statsDiv.innerHTML = `
                <h3>補正統計</h3>
                <p>総山数: ${stats.total_mountains}</p>
                <p>最大補正: ${stats.max_correction.toFixed(4)}°</p>
                <p>最小補正: ${stats.min_correction.toFixed(4)}°</p>
                <p>平均補正: ${stats.avg_correction.toFixed(4)}°</p>
                <p>補正なし: ${stats.zero_corrections}山</p>
                <p>補正あり: ${stats.non_zero_corrections}山</p>
                <p>検証結果: ${engine.validateCorrections() ? '✓ OK' : '✗ NG'}</p>
            `;
        }

        // テーブルを表示
        function displayTable() {
            const tableHtml = engine.generateMountainCorrectionTable();
            document.getElementById('correction-table').innerHTML = tableHtml;
        }

        // 初期化
        drawMountainMarkers();
        drawCorrectionLines();
        displayStats();
        displayTable();

        console.log('地盤二十四山補正エンジンデモが読み込まれました');
        console.log('エンジン検証:', engine.validateCorrections() ? '✓ OK' : '✗ NG');
    </script>
</body>
</html>
